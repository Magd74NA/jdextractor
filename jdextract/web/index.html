<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDExtractor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-base-200 min-h-screen" x-data="app()">
    <div class="container mx-auto px-4 py-8 max-w-4xl space-y-4">

        <h1 class="text-3xl font-bold text-primary border-b-2 border-primary pb-2">JDExtractor</h1>

        <!-- Configuration -->
        <div class="card bg-base-100 shadow-md">
            <div class="card-body py-3">
                <button class="flex justify-between items-center w-full text-left"
                        @click="configOpen = !configOpen">
                    <span class="card-title text-lg">Configuration</span>
                    <span x-text="configOpen ? '▲' : '▼'" class="text-base-content/50 text-sm"></span>
                </button>
                <div x-show="configOpen" class="mt-3 space-y-4">

                    <!-- Model -->
                    <div class="form-control space-y-1">
                        <label class="label pb-0"><span class="label-text font-medium">Model</span></label>
                        <select class="select select-bordered w-full" x-model="config.deepseek_model">
                            <option value="deepseek-chat">deepseek-chat — fast &amp; cheap (recommended for 90% of use cases)</option>
                            <option value="deepseek-reasoner">deepseek-reasoner — smarter but slower and costs more</option>
                        </select>
                    </div>

                    <!-- API Key -->
                    <div class="form-control space-y-1">
                        <label class="label pb-0"><span class="label-text font-medium">DeepSeek API Key</span></label>
                        <div class="flex gap-2">
                            <input class="input input-bordered flex-1 font-mono text-sm"
                                   :type="showApiKey ? 'text' : 'password'"
                                   placeholder="sk-..."
                                   x-model="config.deepseek_api_key">
                            <button class="btn btn-ghost btn-sm self-center"
                                    @click="showApiKey = !showApiKey"
                                    x-text="showApiKey ? 'Hide' : 'Show'"></button>
                        </div>
                    </div>

                    <!-- Port -->
                    <div class="form-control space-y-1">
                        <label class="label pb-0"><span class="label-text font-medium">Port</span></label>
                        <input type="number" class="input input-bordered w-32"
                               x-model.number="config.port">
                        <p class="text-xs text-base-content/50">Port changes require a server restart.</p>
                    </div>

                    <!-- Save -->
                    <div class="flex items-center gap-3">
                        <button class="btn btn-primary btn-sm" @click="saveConfig()"
                                :disabled="configSaving">
                            <span x-show="configSaving" class="loading loading-spinner loading-xs"></span>
                            Save
                        </button>
                        <span x-show="configSaved" class="text-success text-sm">✓ Saved</span>
                        <span x-show="configError" class="text-error text-sm" x-text="configError"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Templates -->
        <div class="card bg-base-100 shadow-md">
            <div class="card-body py-3">
                <button class="flex justify-between items-center w-full text-left"
                        @click="templatesOpen = !templatesOpen; if(templatesOpen && tmpl.resume === undefined) loadTemplates()">
                    <span class="card-title text-lg">Templates</span>
                    <span x-text="templatesOpen ? '▲' : '▼'" class="text-base-content/50 text-sm"></span>
                </button>
                <div x-show="templatesOpen" class="mt-3 space-y-4">
                    <div x-show="tmplLoading" class="flex justify-center py-3">
                        <span class="loading loading-spinner loading-sm"></span>
                    </div>
                    <div x-show="!tmplLoading" class="space-y-4">
                        <div>
                            <p class="font-semibold text-sm mb-1">Resume Template</p>
                            <textarea class="textarea textarea-bordered w-full h-64 font-mono text-xs"
                                      placeholder="Paste your base resume here..."
                                      x-model="tmpl.resume"></textarea>
                            <div class="flex items-center gap-2 mt-1">
                                <button class="btn btn-sm btn-primary" @click="saveTemplate('resume')">Save</button>
                                <span x-show="tmplResumeSaved" class="text-success text-sm">✓ Saved</span>
                            </div>
                        </div>
                        <div>
                            <p class="font-semibold text-sm mb-1">Cover Letter Template</p>
                            <textarea class="textarea textarea-bordered w-full h-48 font-mono text-xs"
                                      placeholder="Paste your base cover letter here (optional)..."
                                      x-model="tmpl.cover"></textarea>
                            <div class="flex items-center gap-2 mt-1">
                                <button class="btn btn-sm btn-primary" @click="saveTemplate('cover')">Save</button>
                                <span x-show="tmplCoverSaved" class="text-success text-sm">✓ Saved</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Single URL -->
        <div class="card bg-base-100 shadow-md">
            <div class="card-body py-3">
                <button class="flex justify-between items-center w-full text-left"
                        @click="singleOpen = !singleOpen">
                    <span class="card-title text-lg">Process URL</span>
                    <span x-text="singleOpen ? '▲' : '▼'" class="text-base-content/50 text-sm"></span>
                </button>
                <div x-show="singleOpen" class="mt-3 space-y-3">
                    <input type="url" class="input input-bordered w-full"
                           placeholder="https://jobs.example.com/..."
                           x-model="singleURL" @keydown.enter="submitSingle()">
                    <div class="flex items-center gap-3">
                        <button class="btn btn-primary btn-sm" @click="submitSingle()"
                                :disabled="singleLoading || !singleURL.trim()">
                            <span x-show="singleLoading" class="loading loading-spinner loading-xs"></span>
                            Generate
                        </button>
                        <span x-show="singleResult" class="text-success text-sm" x-text="'✓ ' + singleResult"></span>
                        <span x-show="singleError" class="text-error text-sm" x-text="singleError"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Batch URLs -->
        <div class="card bg-base-100 shadow-md">
            <div class="card-body py-3">
                <button class="flex justify-between items-center w-full text-left"
                        @click="batchOpen = !batchOpen">
                    <span class="card-title text-lg">Process Batch (URLs)</span>
                    <span x-text="batchOpen ? '▲' : '▼'" class="text-base-content/50 text-sm"></span>
                </button>
                <div x-show="batchOpen" class="mt-3 space-y-3">
                    <textarea class="textarea textarea-bordered w-full h-28 font-mono text-sm"
                              placeholder="One URL per line"
                              x-model="batchURLs"></textarea>
                    <div class="flex items-center gap-3">
                        <button class="btn btn-primary btn-sm" @click="submitBatch()"
                                :disabled="batchLoading || !batchURLs.trim()">
                            <span x-show="batchLoading" class="loading loading-spinner loading-xs"></span>
                            Generate All
                        </button>
                        <span x-show="batchError" class="text-error text-sm" x-text="batchError"></span>
                    </div>
                    <template x-if="batchResults.length > 0">
                        <ul class="text-sm space-y-1">
                            <template x-for="r in batchResults" :key="r.url">
                                <li>
                                    <span x-show="!r.error" class="text-success">✓</span>
                                    <span x-show="r.error" class="text-error">✗</span>
                                    <span class="font-mono ml-1" x-text="r.url"></span>
                                    <span x-show="r.error" class="text-error ml-1" x-text="'— ' + r.error"></span>
                                </li>
                            </template>
                        </ul>
                    </template>
                </div>
            </div>
        </div>

        <!-- Local text -->
        <div class="card bg-base-100 shadow-md">
            <div class="card-body py-3">
                <button class="flex justify-between items-center w-full text-left"
                        @click="localOpen = !localOpen">
                    <span class="card-title text-lg">Process Local Text</span>
                    <span x-text="localOpen ? '▲' : '▼'" class="text-base-content/50 text-sm"></span>
                </button>
                <div x-show="localOpen" class="mt-3 space-y-3">
                    <textarea class="textarea textarea-bordered w-full h-40 font-mono text-sm"
                              placeholder="Paste the raw job description text here..."
                              x-model="localContent"></textarea>
                    <div class="flex items-center gap-3">
                        <button class="btn btn-primary btn-sm" @click="submitLocal()"
                                :disabled="localLoading || !localContent.trim()">
                            <span x-show="localLoading" class="loading loading-spinner loading-xs"></span>
                            Generate
                        </button>
                        <span x-show="localResult" class="text-success text-sm" x-text="'✓ ' + localResult"></span>
                        <span x-show="localError" class="text-error text-sm" x-text="localError"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Applications table -->
        <div class="card bg-base-100 shadow-md">
            <div class="card-body">
                <h2 class="card-title text-2xl">Applications</h2>

                <div x-show="jobsLoading" class="flex justify-center py-4">
                    <span class="loading loading-spinner loading-md"></span>
                </div>

                <div x-show="jobsError" class="alert alert-error">
                    <span x-text="jobsError"></span>
                </div>

                <div x-show="!jobsLoading && !jobsError && jobs.length === 0" class="text-base-content/50 py-4">
                    No applications yet.
                </div>

                <div x-show="!jobsLoading && jobs.length > 0" class="overflow-x-auto">
                    <table class="table table-zebra">
                        <thead>
                            <tr>
                                <th class="min-w-28">Date</th>
                                <th>Company</th>
                                <th>Role</th>
                                <th>Score</th>
                                <th>Status</th>
                                <th></th>
                                <th></th>
                            </tr>
                        </thead>
                        <template x-for="job in jobs" :key="job.dir">
                            <tbody>
                                <tr>
                                    <td x-text="job.date"></td>
                                    <td x-text="job.company"></td>
                                    <td x-text="job.role"></td>
                                    <td>
                                        <span class="badge badge-neutral" x-text="job.score + '/10'"></span>
                                    </td>
                                    <td>
                                        <select class="select select-xs select-bordered"
                                                :value="job.status || 'draft'"
                                                @change="updateStatus(job, $event.target.value)">
                                            <template x-for="s in statuses" :key="s">
                                                <option :value="s" :selected="(job.status || 'draft') === s" x-text="s"></option>
                                            </template>
                                        </select>
                                    </td>
                                    <td>
                                        <button class="btn btn-xs btn-ghost"
                                                @click="openFiles(job)"
                                                x-text="job.open ? '▲' : '▼'"></button>
                                    </td>
                                    <td>
                                        <button class="btn btn-xs btn-error btn-outline"
                                                @click="deleteJob(job)">Delete</button>
                                    </td>
                                </tr>
                                <tr x-show="job.open">
                                    <td colspan="7" class="bg-base-200 p-4">
                                        <div x-show="job.filesLoading" class="flex justify-center py-3">
                                            <span class="loading loading-spinner loading-sm"></span>
                                        </div>
                                        <div x-show="!job.filesLoading" class="space-y-4">
                                            <div>
                                                <p class="font-semibold text-sm mb-1">Resume</p>
                                                <textarea class="textarea textarea-bordered w-full h-48 font-mono text-xs"
                                                          x-model="job.resume"></textarea>
                                                <div class="flex items-center gap-2 mt-1">
                                                    <button class="btn btn-sm btn-primary"
                                                            @click="saveFile(job, 'resume')">Save</button>
                                                    <span x-show="job.resumeSaved" class="text-success text-sm">✓ Saved</span>
                                                </div>
                                            </div>
                                            <div x-show="job.cover !== null">
                                                <p class="font-semibold text-sm mb-1">Cover Letter</p>
                                                <textarea class="textarea textarea-bordered w-full h-48 font-mono text-xs"
                                                          x-model="job.cover"></textarea>
                                                <div class="flex items-center gap-2 mt-1">
                                                    <button class="btn btn-sm btn-primary"
                                                            @click="saveFile(job, 'cover')">Save</button>
                                                    <span x-show="job.coverSaved" class="text-success text-sm">✓ Saved</span>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </template>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
    function app() {
        return {
            // config card
            configOpen: false,
            config: { deepseek_api_key: '', deepseek_model: 'deepseek-chat', port: 8080 },
            configSaving: false,
            configSaved: false,
            configError: null,
            showApiKey: false,

            // jobs table
            jobs: [],
            jobsLoading: true,
            jobsError: null,
            statuses: ['draft', 'applied', 'interviewing', 'offer', 'rejected'],

            // templates card
            templatesOpen: false,
            tmpl: { resume: undefined, cover: '' },
            tmplLoading: false,
            tmplResumeSaved: false,
            tmplCoverSaved: false,

            // single URL card
            singleOpen: false,
            singleURL: '',
            singleLoading: false,
            singleResult: null,
            singleError: null,

            // batch card
            batchOpen: false,
            batchURLs: '',
            batchLoading: false,
            batchResults: [],
            batchError: null,

            // local text card
            localOpen: false,
            localContent: '',
            localLoading: false,
            localResult: null,
            localError: null,

            async init() {
                await this.loadConfig();
                await this.loadJobs();
            },

            async loadConfig() {
                try {
                    const res = await fetch('/api/config');
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    this.config = {
                        deepseek_api_key: data.deepseek_api_key || '',
                        deepseek_model: data.deepseek_model || 'deepseek-chat',
                        port: data.port || 8080,
                    };
                } catch (e) {
                    // non-fatal — defaults remain
                }
            },

            async saveConfig() {
                this.configSaved = false;
                this.configError = null;
                this.configSaving = true;
                try {
                    const res = await fetch('/api/config', {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.config),
                    });
                    if (!res.ok) throw new Error(await res.text());
                    this.configSaved = true;
                    setTimeout(() => { this.configSaved = false; }, 3000);
                } catch (e) {
                    this.configError = e.message;
                } finally {
                    this.configSaving = false;
                }
            },

            async loadTemplates() {
                this.tmplLoading = true;
                try {
                    const res = await fetch('/api/templates');
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    this.tmpl.resume = data.resume ?? '';
                    this.tmpl.cover = data.cover ?? '';
                } catch (e) {
                    this.tmpl.resume = '';
                } finally {
                    this.tmplLoading = false;
                }
            },

            async saveTemplate(type) {
                const body = type === 'resume' ? { resume: this.tmpl.resume } : { cover: this.tmpl.cover };
                await fetch('/api/templates', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (type === 'resume') {
                    this.tmplResumeSaved = true;
                    setTimeout(() => { this.tmplResumeSaved = false; }, 3000);
                } else {
                    this.tmplCoverSaved = true;
                    setTimeout(() => { this.tmplCoverSaved = false; }, 3000);
                }
            },

            async saveFile(job, type) {
                const body = type === 'resume' ? { resume: job.resume } : { cover: job.cover };
                await fetch('/api/jobs/' + job.dir + '/files', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (type === 'resume') {
                    job.resumeSaved = true;
                    setTimeout(() => { job.resumeSaved = false; }, 3000);
                } else {
                    job.coverSaved = true;
                    setTimeout(() => { job.coverSaved = false; }, 3000);
                }
            },

            async openFiles(job) {
                job.open = !job.open;
                if (job.open && job.resume === undefined) {
                    job.filesLoading = true;
                    try {
                        const res = await fetch('/api/jobs/' + job.dir + '/files');
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        const data = await res.json();
                        job.resume = data.resume ?? null;
                        job.cover = data.cover ?? null;
                    } catch (e) {
                        job.resume = null;
                        job.cover = null;
                    } finally {
                        job.filesLoading = false;
                    }
                }
            },

            async loadJobs() {
                this.jobsLoading = true;
                this.jobsError = null;
                try {
                    const res = await fetch('/api/jobs');
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const raw = await res.json();
                    this.jobs = raw.map(j => ({ ...j, open: false, filesLoading: false, resume: undefined, cover: undefined, resumeSaved: false, coverSaved: false }));
                } catch (e) {
                    this.jobsError = e.message;
                } finally {
                    this.jobsLoading = false;
                }
            },

            async updateStatus(job, status) {
                const res = await fetch('/api/jobs/' + job.dir, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status }),
                });
                if (res.ok) job.status = status;
            },

            async deleteJob(job) {
                const res = await fetch('/api/jobs/' + job.dir, { method: 'DELETE' });
                if (res.ok) this.jobs = this.jobs.filter(j => j.dir !== job.dir);
            },

            async submitSingle() {
                this.singleResult = null;
                this.singleError = null;
                this.singleLoading = true;
                try {
                    const res = await fetch('/api/process', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: this.singleURL.trim() }),
                    });
                    if (!res.ok) throw new Error(await res.text());
                    const data = await res.json();
                    this.singleResult = data.dir;
                    this.singleURL = '';
                    await this.loadJobs();
                } catch (e) {
                    this.singleError = e.message;
                } finally {
                    this.singleLoading = false;
                }
            },

            async submitBatch() {
                this.batchResults = [];
                this.batchError = null;
                this.batchLoading = true;
                const urls = this.batchURLs.split('\n').map(u => u.trim()).filter(Boolean);
                try {
                    const res = await fetch('/api/process/batch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ urls }),
                    });
                    if (!res.ok) throw new Error(await res.text());
                    this.batchResults = await res.json();
                    await this.loadJobs();
                } catch (e) {
                    this.batchError = e.message;
                } finally {
                    this.batchLoading = false;
                }
            },

            async submitLocal() {
                this.localResult = null;
                this.localError = null;
                this.localLoading = true;
                try {
                    const res = await fetch('/api/process/local', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: this.localContent }),
                    });
                    if (!res.ok) throw new Error(await res.text());
                    const data = await res.json();
                    this.localResult = data.dir;
                    this.localContent = '';
                    await this.loadJobs();
                } catch (e) {
                    this.localError = e.message;
                } finally {
                    this.localLoading = false;
                }
            },
        };
    }
    </script>
</body>

</html>
