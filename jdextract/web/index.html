<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <!-- Tailwind CSS + DaisyUI via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js via CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-base-200 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="card bg-base-100 shadow-md" x-data="{
                jobs: [],
                loading: true,
                error: null,
                statuses: ['draft', 'applied', 'interviewing', 'offer', 'rejected'],
                async init() {
                    try {
                        const res = await fetch('/api/jobs');
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        this.jobs = await res.json();
                    } catch (e) {
                        this.error = e.message;
                    } finally {
                        this.loading = false;
                    }
                },
                async updateStatus(job, status) {
                    const res = await fetch('/api/jobs/' + job.dir, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status }),
                    });
                    if (res.ok) job.status = status;
                },
                async deleteJob(job) {
                    const res = await fetch('/api/jobs/' + job.dir, { method: 'DELETE' });
                    if (res.ok) this.jobs = this.jobs.filter(j => j.dir !== job.dir);
                }
             }">
            <div class="card-body">
                <h2 class="card-title text-2xl">Applications</h2>

                <div x-show="loading" class="flex justify-center py-4">
                    <span class="loading loading-spinner loading-md"></span>
                </div>

                <div x-show="error" class="alert alert-error">
                    <span x-text="error"></span>
                </div>

                <div x-show="!loading && !error && jobs.length === 0" class="text-base-content/50 py-4">
                    No applications yet.
                </div>

                <div x-show="!loading && jobs.length > 0" class="overflow-x-auto">
                    <table class="table table-zebra">
                        <thead>
                            <tr>
                                <th class="min-w-28">Date</th>
                                <th>Company</th>
                                <th>Role</th>
                                <th>Score</th>
                                <th>Status</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="job in jobs" :key="job.dir">
                                <tr>
                                    <td x-text="job.date"></td>
                                    <td x-text="job.company"></td>
                                    <td x-text="job.role"></td>
                                    <td>
                                        <span class="badge badge-neutral" x-text="job.score + '/10'"></span>
                                    </td>
                                    <td>
                                        <select class="select select-xs select-bordered"
                                                :value="job.status || 'draft'"
                                                @change="updateStatus(job, $event.target.value)">
                                            <template x-for="s in statuses" :key="s">
                                                <option :value="s" :selected="(job.status || 'draft') === s" x-text="s"></option>
                                            </template>
                                        </select>
                                    </td>
                                    <td>
                                        <button class="btn btn-xs btn-error btn-outline"
                                                @click="deleteJob(job)">Delete</button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
